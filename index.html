<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Find Your Way — Sligo University Hospital</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;background:#f4f5f5;color:#01241A;-webkit-font-smoothing:antialiased;min-height:100vh}

.hdr{background:#006152;color:#fff;padding:12px 16px 10px;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.hdr-logo{height:28px;width:auto;display:block;flex-shrink:0}
.hdr-txt{margin-left:auto;text-align:right;font-size:12px;line-height:1.3;opacity:.85}
.hdr-txt b{display:block;font-size:14px;opacity:1}
.srch{position:relative}
.srch input{width:100%;padding:10px 36px 10px 14px;border:none;border-radius:8px;font-size:16px;font-family:Arial,sans-serif;background:rgba(255,255,255,.15);color:#fff;outline:none}
.srch input::placeholder{color:rgba(255,255,255,.5)}
.srch input:focus{background:rgba(255,255,255,.25)}
.srch-x{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.5);font-size:20px;cursor:pointer;display:none;padding:4px}

.tabs{display:flex;gap:6px;padding:10px 16px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:6px 14px;border-radius:18px;font-size:12px;font-weight:bold;cursor:pointer;border:2px solid #CCD4D1;background:#fff;color:#667D75;transition:all .2s;white-space:nowrap}
.tab.on{border-color:#006152;background:#006152;color:#fff}

.main{padding:6px 16px 80px}
.lbl{font-size:11px;color:#667D75;padding:10px 0 6px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px}
.empty{text-align:center;padding:40px 20px;color:#99A8A3;font-size:14px}

.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:8px;cursor:pointer;border-left:4px solid #006152;transition:box-shadow .15s}
.card:active{box-shadow:0 2px 12px rgba(0,0,0,.1)}
.card-top{display:flex;align-items:center;gap:10px}
.card-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-icon svg{width:18px;height:18px}
.card-name{font-size:15px;font-weight:bold;color:#01241A;line-height:1.2}
.card-sub{font-size:12px;color:#667D75;margin-top:2px}
.card-meta{display:flex;gap:12px;margin-top:4px;margin-left:44px}
.card-meta span{font-size:11px;color:#99A8A3}

/* Pastel floor accent colours */
.fl3{border-left-color:#006152}.fl3 .card-icon{background:#E0EEEC;color:#006152}
.fl4{border-left-color:#6B8F65}.fl4 .card-icon{background:#C8D8C0;color:#3D5E38}
.fl5{border-left-color:#5088A8}.fl5 .card-icon{background:#B8D4E3;color:#2A6080}
.fl6{border-left-color:#7B60A0}.fl6 .card-icon{background:#D5C8E0;color:#5A3D80}
.fl7{border-left-color:#5A90B8}.fl7 .card-icon{background:#C0D8EA;color:#2D6890}
.fl8{border-left-color:#B89850}.fl8 .card-icon{background:#E8D8B8;color:#8A7030}

.dir{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#f4f5f5;z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch}
.dir.show{display:block}
.dir-hdr{position:sticky;top:0;z-index:10;padding:14px 16px;display:flex;align-items:center;gap:12px;background:#006152}
.dir-back{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px;line-height:1}
.dir-title{font-size:16px;font-weight:bold;color:#fff;flex:1}
.dir-floor{font-size:11px;color:rgba(255,255,255,.7);font-weight:normal}
.dir-info{padding:14px 16px;background:#fff;border-bottom:1px solid #E5E8E8}
.dir-info-row{display:flex;gap:16px;font-size:13px;color:#667D75}
.dir-info-row span{display:flex;align-items:center;gap:4px}
.dir-body{padding:16px}

.step{display:flex;gap:12px;position:relative;padding-bottom:20px}
.step:last-child{padding-bottom:0}
.step-dot{width:28px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:#fff;flex-shrink:0}
.dot-go{background:#006152}
.dot-turn{background:#0048A8}
.dot-arrive{background:#DF8234}
.step-line{width:2px;flex:1;background:#CCD4D1;margin-top:4px}
.step:last-child .step-line{display:none}
.step-txt{font-size:14px;line-height:1.5;color:#335247;padding-top:4px}
.step-txt strong{color:#01241A}
.step-lm{font-size:12px;color:#99A8A3;margin-top:3px;font-style:italic}
</style>
</head>

let curFloor='all',curQ='';

function renderTabs(){
  document.getElementById('tabs').innerHTML=floors.map(f=>
    '<div class="tab '+(f.id===curFloor?'on':'')+'" onclick="setFloor(\''+f.id+'\')">'+f.label+'</div>'
  ).join('');
}

function renderList(){
  const q=curQ.toLowerCase();
  let list=depts;
  if(curFloor!=='all')list=list.filter(d=>d.floor===curFloor);
  if(q)list=list.filter(d=>d.name.toLowerCase().includes(q)||d.cat.toLowerCase().includes(q));
  const el=document.getElementById('list');
  const lbl=document.getElementById('lbl');
  if(!list.length){el.innerHTML='<div class="empty">No departments found.</div>';lbl.textContent='No results';return}
  lbl.textContent=q?'Results for "'+curQ+'"':(curFloor==='all'?'All Departments':floorLabel[curFloor]||'');
  el.innerHTML=list.map(d=>'<div class="card fl'+d.floor+'" onclick="openDir(\''+d.id+'\')"><div class="card-top"><div class="card-icon">'+(icons[d.icon]||icons.clinic)+'</div><div><div class="card-name">'+d.name+'</div><div class="card-sub">'+floorLabel[d.floor]+' · '+d.cat+'</div></div></div><div class="card-meta"><span>\u{1F6B6} '+d.walk+'</span>'+(d.acc?'<span>\u267F Accessible</span>':'')+'</div></div>').join('');
}

function setFloor(f){curFloor=f;renderTabs();renderList()}

const qInput=document.getElementById('q');
const qx=document.getElementById('qx');
qInput.addEventListener('input',()=>{curQ=qInput.value;qx.style.display=curQ?'block':'none';renderList()});
function clearSearch(){qInput.value='';curQ='';qx.style.display='none';renderList();qInput.focus()}

function openDir(id){
  const d=depts.find(x=>x.id===id);if(!d)return;
  document.getElementById('dirTitle').textContent=d.name;
  document.getElementById('dirFloor').textContent=floorLabel[d.floor];
  document.getElementById('dirInfo').innerHTML='<div class="dir-info-row"><span>\u{1F6B6} '+d.walk+'</span><span>\u{1F4CD} '+floorLabel[d.floor]+'</span>'+(d.acc?'<span>\u267F Accessible</span>':'')+'</div>';
  let h='';
  d.steps.forEach((s,i)=>{
    const dc=s.type==='arrive'?'dot-arrive':s.type==='turn'?'dot-turn':'dot-go';
    const lb=s.type==='arrive'?'\u2605':(i+1);
    h+='<div class="step"><div class="step-dot"><div class="dot '+dc+'">'+lb+'</div><div class="step-line"></div></div><div><div class="step-txt">'+s.t+'</div>'+(s.lm?'<div class="step-lm">\u{1F4CD} '+s.lm+'</div>':'')+'</div></div>';
  });
  document.getElementById('dirBody').innerHTML=h;
  const dir=document.getElementById('dir');dir.classList.add('show');dir.scrollTop=0;
}
function closeDir(){document.getElementById('dir').classList.remove('show')}

renderTabs();renderList();
